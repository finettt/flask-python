<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style type="text/css">
        body {
            background: #4b84f5;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            margin-top: 100px;
        }
        h1{
            font-weight: bold;
            font-size: 50px;
            margin-bottom: 50px;
            /*text-shadow: 2px 2px 4px black;*/
        }
        a {
            font-weight: bold;
            text-decoration: none;
            color: white;
            text-shadow: 2px 2px 4px black;
        }
        .container {
            width: 50%;
            border-radius: 10px;
            background: #7ba5ec;
            padding: 20px;
            box-shadow: 2px 2px 4px black;
            margin: auto;
            animation: pulse 2s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 20px #2d3748;
            }
            50% {
                box-shadow: 0 0 0 #2d3748;
            }
        }
    </style>
</head>
<body>
    <h1>Contact Information</h1>
    <p>Connect with me on GitHub:</p>
    <a href="https://github.com/finettt" target="_blank">GitHub Profile</a>
    
</body>
</html>
