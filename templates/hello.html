<style type="text/css">
    body {
            background: #355caa;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            margin-top: 100px;
        }
        h1{
            font-weight: bold;
            font-size: 50px;
            margin-bottom: 50px;
            /*text-shadow: 2px 2px 4px black;*/
        }
        a {
            font-weight: bold;
            text-decoration: none;
            color: white;
            text-shadow: 2px 2px 4px black;
        }
        .links{
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
            
        }
        
        .links a{
            text-decoration: none;
            color: white;
            text-shadow: 2px 2px 4px black;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 20px #2d3748;
            }
            50% {
                box-shadow: 0 0 0 #2d3748;
            }
        }
</style>
